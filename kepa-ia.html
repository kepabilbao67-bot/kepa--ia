
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Kepa IA">
<title>Kepa IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #FF6B00;
  --orange-glow: rgba(255,107,0,0.15);
  --orange-dim: rgba(255,107,0,0.6);
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --border: rgba(255,107,0,0.2);
  --text: #f0f0f0;
  --text-dim: #666;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); flex-shrink:0; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:34px; height:34px; background:var(--orange); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; color:#000; font-weight:700; font-family:'Space Mono',monospace; }
.logo-text { font-family:'Space Mono',monospace; font-size:15px; font-weight:700; letter-spacing:1px; }
.logo-text span { color:var(--orange); }
.status { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-dim); border-radius:50%; box-shadow:0 0 8px #00ff88; animation:pulse 2s infinite; }
.status-dot { width:7px; height:7px; background:var(--bg3); border:1px solid var(--border); border-radius:50%; transition:all 0.2s; }
.status-dot { width:7px; height:7px; background:rgba(0,100%,53%,1); opacity:1; border-radius:50%; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.btn-icon { width:32px; height:32px; background:rgba(255,107,0,0.06); border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; }
.mode-bar { padding:8px 18px; background:var(--bg2); font-family:'Space Mono',monospace; font-size:11px; color:var(--orange-dim); display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
#messages { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
#messages::-webkit-scrollbar { width:3px; }
#messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:16px; padding:40px 20px; text-align:center; }
.welcome-icon { width:56px; height:56px; background:var(--orange); border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:0 0 30px var(--orange-glow); }
.welcome h2 { font-size:22px; font-weight:600; }
.welcome p { color:var(--text-dim); font-size:14px; line-height:1.5; }
.chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:8px; }
.chip { padding:8px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:20px; font-size:13px; cursor:pointer; transition:all 0.2s; }
.chip:hover { background:var(--orange-glow); border-color:var(--orange); }
.message { display:flex; flex-direction:column; gap:4px; max-width:85%; }
.message.user { align-self:flex-end; align-items:flex-end; }
.message.ai { align-self:flex-start; }
.msg-label { font-size:10px; color:var(--text-dim); font-family:'Space Mono',monospace; padding:0 4px; }
.msg-bubble { padding:12px 15px; border-radius:16px; font-size:14px; line-height:1.6; }
.message.user .msg-bubble { background:var(--orange); color:#000; font-weight:500; border-bottom-right-radius:4px; }
.message.ai .msg-bubble { background:var(--bg3); border:1px solid var(--border); border-bottom-left-radius:4px; }
.error-msg { background:rgba(255,50,50,0.15); border:1px solid rgba(255,50,50,0.3); color:#ff6b6b; padding:10px 14px; border-radius:12px; font-size:13px; }
.typing-indicator { display:flex; align-items:center; gap:5px; padding:12px 15px; background:var(--bg3); border:1px solid var(--border); border-radius:16px; border-bottom-left-radius:4px; width:fit-content; }
.typing-dot { width:6px; height:6px; background:var(--orange-dim); border-radius:50%; animation:bounce 1.2s infinite; }
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-area { padding:12px 16px; border-top:1px solid var(--border); background:var(--bg); flex-shrink:0; }
.input-wrap { display:flex; align-items:flex-end; gap:10px; background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:10px 14px; transition:border-color 0.2s; }
.input-wrap:focus-within { border-color:var(--orange); }
#inp { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; resize:none; max-height:120px; line-height:1.5; }
#inp::placeholder { color:var(--text-dim); }
#btn { width:36px; height:36px; background:var(--orange); border:none; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:opacity 0.2s; }
#btn:disabled { opacity:0.4; }
.hint { text-align:center; font-size:11px; color:var(--text-dim); margin-top:6px; font-family:'Space Mono',monospace; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">KIA</div>
    <div class="logo-text">KEPA <span>IA</span></div>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    Claude Sonnet
  </div>
  <div class="btn-icon" onclick="resetChat()">↺</div>
</header>
<div class="mode-bar">⚡ Asistente Personal · Automatización IA · Bilbao</div>
<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">⚡</div>
    <h2>Hola Kepa</h2>
    <p>Tu asistente personal de IA. Pregúntame lo que necesites.</p>
    <div class="chips">
      <div class="chip" onclick="sendChip('Ayúdame con Make.com')">Make.com</div>
      <div class="chip" onclick="sendChip('Ideas de negocio con IA')">Ideas negocio</div>
      <div class="chip" onclick="sendChip('Cómo automatizar esto')">Automatizar</div>
      <div class="chip" onclick="sendChip('Crear contenido para redes')">Contenido</div>
    </div>
  </div>
</div>
<div class="input-area">
  <div class="input-wrap">
    <textarea id="inp" placeholder="Pregúntame lo que quieras..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
  <div class="hint">Enter para enviar · Shift+Enter nueva línea</div>
</div>
<script>
const SYSTEM_PROMPT = `Eres el asistente personal de Kepa Bilbao, experto en automatización con IA, Make.com, y negocios digitales desde Bilbao. Eres directo, práctico y hablas en español. Das respuestas concretas y accionables. Tu nombre es Kepa IA.`;
let history = [];
let loading = false;
const inp = document.getElementById('inp');
const btn = document.getElementById('btn');
const msgs = document.getElementById('msgs') || document.getElementById('messages');

try { const h = localStorage.getItem('kepa-history'); if(h){ history = JSON.parse(h); if(history.length>0){ document.getElementById('welcome').style.display='none'; history.forEach(m=>addMsg(m.role==='user'?'user':'ai', m.content)); } } } catch(e){}

function autoResize(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function sendChip(text){ inp.value=text; sendMessage(); }

function addMsg(role, text){
  const welcome = document.getElementById('welcome');
  if(welcome) welcome.style.display='none';
  const wrap = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'message '+role;
  if(role==='user'){
    d.innerHTML = `<div class="msg-label">Tú</div><div class="msg-bubble">${text}</div>`;
  } else if(role==='ai'){
    d.innerHTML = `<div class="msg-label">Kepa IA</div><div class="msg-bubble">${text}</div>`;
  } else {
    d.innerHTML = `<div class="msg-label">Kepa IA</div><div class="error-msg">⚠ ${text}</div>`;
  }
  wrap.appendChild(d);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping(){
  const wrap = document.getElementById('messages');
  const d = document.createElement('div');
  d.id = 'typing';
  d.className = 'message ai';
  d.innerHTML = `<div class="msg-label">Kepa IA</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  wrap.appendChild(d);
  wrap.scrollTop = wrap.scrollHeight;
}

function resetChat(){
  history = [];
  localStorage.removeItem('kepa-history');
  document.getElementById('messages').innerHTML = `<div class="welcome" id="welcome"><div class="welcome-icon">⚡</div><h2>Hola Kepa</h2><p>Tu asistente personal de IA. Pregúntame lo que necesites.</p><div class="chips"><div class="chip" onclick="sendChip('Ayúdame con Make.com')">Make.com</div><div class="chip" onclick="sendChip('Ideas de negocio con IA')">Ideas negocio</div><div class="chip" onclick="sendChip('Cómo automatizar esto')">Automatizar</div><div class="chip" onclick="sendChip('Crear contenido para redes')">Contenido</div></div></div>`;
}

async function sendMessage(){
  const text = inp.value.trim();
  if(!text||loading) return;
  inp.value=''; inp.style.height='auto'; loading=true; btn.disabled=true;
  addMsg('user', text);
  history.push({role:'user', content:text});
  showTyping();
  try {
    const r = await fetch('/api/chat.js', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({model:'claude-haiku-4-5', max_tokens:1000, system:SYSTEM_PROMPT, messages:history})});
    const data = await r.json();
    document.getElementById('typing')?.remove();
    if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
    const reply = data.content?.[0]?.text||'Sin respuesta';
    addMsg('ai', reply);
    history.push({role:'assistant', content:reply});
    if(history.length>20) history=history.slice(-20);
    localStorage.setItem('kepa-history', JSON.stringify(history));
  } catch(e){
    document.getElementById('typing')?.remove();
    addMsg('error', e.message||'Error de conexión');
  }
  loading=false; btn.disabled=false; inp.focus();
}
inp.focus();
</script>
</body>
</html>
