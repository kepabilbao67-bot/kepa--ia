<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Kepa IA">
<title>Kepa IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #FF6B00;
  --orange-glow: rgba(255,107,0,0.15);
  --orange-dim: rgba(255,107,0,0.6);
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --border: rgba(255,107,0,0.2);
  --text: #f0f0f0;
  --text-dim: #666;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); flex-shrink:0; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:34px; height:34px; background:var(--orange); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'Space Mono',monospace; font-weight:700; font-size:12px; color:#000; }
.logo-text { font-family:'Space Mono',monospace; font-size:15px; font-weight:700; letter-spacing:1px; }
.logo-text span { color:var(--orange); }
.status { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-dim); font-family:'Space Mono',monospace; }
.status-dot { width:7px; height:7px; background:#00ff88; border-radius:50%; box-shadow:0 0 8px #00ff88; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.btn-icon { width:32px; height:32px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; transition:all 0.2s; }
.mode-bar { padding:8px 18px; background:rgba(255,107,0,0.06); border-bottom:1px solid var(--border); font-size:11px; color:var(--orange-dim); font-family:'Space Mono',monospace; flex-shrink:0; }
#messages { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
#messages::-webkit-scrollbar { width:4px; }
#messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.message { display:flex; flex-direction:column; gap:4px; animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.message.user { align-items:flex-end; }
.message.ai { align-items:flex-start; }
.msg-label { font-size:10px; font-family:'Space Mono',monospace; color:var(--text-dim); padding:0 4px; }
.message.user .msg-label { color:var(--orange-dim); }
.msg-bubble { max-width:85%; padding:12px 16px; border-radius:16px; font-size:14px; line-height:1.6; white-space:pre-wrap; word-break:break-word; }
.message.user .msg-bubble { background:rgba(255,107,0,0.12); border:1px solid rgba(255,107,0,0.25); border-bottom-right-radius:4px; }
.message.ai .msg-bubble { background:#141414; border:1px solid rgba(255,255,255,0.06); border-bottom-left-radius:4px; }
.typing-indicator { display:flex; align-items:center; gap:4px; padding:14px 16px; background:#141414; border:1px solid rgba(255,255,255,0.06); border-radius:16px; border-bottom-left-radius:4px; }
.typing-dot { width:6px; height:6px; background:var(--orange); border-radius:50%; animation:typingBounce 1.2s infinite; }
.typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }
.welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:12px; padding:40px 20px; text-align:center; }
.welcome-icon { width:64px; height:64px; background:rgba(255,107,0,0.1); border:1px solid var(--border); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:8px; }
.welcome h2 { font-size:20px; font-weight:600; }
.welcome p { font-size:13px; color:var(--text-dim); max-width:260px; line-height:1.6; }
.quick-actions { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:8px; }
.quick-btn { background:var(--bg3); border:1px solid var(--border); border-radius:20px; padding:8px 14px; font-size:12px; color:var(--text-dim); cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
.quick-btn:hover { background:rgba(255,107,0,0.1); border-color:var(--orange); color:var(--orange); }
.input-area { padding:12px 16px 16px; border-top:1px solid var(--border); background:var(--bg); flex-shrink:0; }
.input-wrap { display:flex; align-items:flex-end; gap:10px; background:var(--bg3); border:1px solid var(--border); border-radius:16px; padding:10px 10px 10px 16px; transition:border-color 0.2s; }
.input-wrap:focus-within { border-color:var(--orange); box-shadow:0 0 0 3px rgba(255,107,0,0.1); }
#input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.5; resize:none; max-height:120px; min-height:22px; }
#input::placeholder { color:var(--text-dim); }
#send-btn { width:36px; height:36px; background:var(--orange); border:none; border-radius:10px; color:#000; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; font-size:16px; }
#send-btn:disabled { background:var(--bg3); color:var(--text-dim); cursor:not-allowed; }
.input-hint { font-size:10px; color:var(--text-dim); margin-top:6px; text-align:center; font-family:'Space Mono',monospace; }
.error-msg { background:rgba(255,50,50,0.1); border:1px solid rgba(255,50,50,0.3); border-radius:12px; padding:10px 14px; font-size:13px; color:#ff6666; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">KIA</div>
    <div class="logo-text">KEPA <span>IA</span></div>
  </div>
  <div class="status"><div class="status-dot"></div>Claude Sonnet</div>
  <button class="btn-icon" onclick="clearChat()">↺</button>
</header>
<div class="mode-bar">⚡ Asistente Personal · Automatización IA · Bilbao</div>
<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">⚡</div>
    <h2>Hola Kepa</h2>
    <p>Tu asistente personal de IA. Pregúntame lo que necesites.</p>
    <div class="quick-actions">
      <button class="quick-btn" onclick="quickSend('Ayúdame a crear un flujo en Make.com')">Make.com</button>
      <button class="quick-btn" onclick="quickSend('Dame ideas para KepatecnologIA')">Ideas negocio</button>
      <button class="quick-btn" onclick="quickSend('Cómo automatizo esto con IA')">Automatizar</button>
      <button class="quick-btn" onclick="quickSend('Revisa mi estrategia de contenido')">Contenido</button>
    </div>
  </div>
</div>
<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" placeholder="Pregúntame lo que quieras..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <div class="input-hint">Enter para enviar · Shift+Enter nueva línea</div>
</div>
<script>
const SYSTEM_PROMPT = `Eres el asistente personal de Kepa, emprendedor de Bilbao especializado en automatización con IA bajo la marca KepatecnologIA. Directo, práctico, en español de España. Sin rodeos.`;
let history = JSON.parse(localStorage.getItem('kepa-history') || '[]');
let loading = false;
const msgs = document.getElementById('messages');
const inp = document.getElementById('input');
const btn = document.getElementById('send-btn');
const welcome = document.getElementById('welcome');
inp.addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px'; });
inp.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
function quickSend(t){ inp.value=t; sendMessage(); }
function clearChat(){ history=[]; localStorage.removeItem('kepa-history'); msgs.innerHTML=''; msgs.appendChild(welcome); welcome.style.display='flex'; }
function addMsg(role, content){
  welcome.style.display='none';
  const d=document.createElement('div');
  d.className=`message ${role}`;
  d.innerHTML=`<div class="msg-label">${role==='user'?'Tú':'Kepa IA'}</div><div class="msg-bubble">${content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(){
  const d=document.createElement('div');
  d.className='message ai'; d.id='typing';
  d.innerHTML='<div class="msg-label">Kepa IA</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}
async function sendMessage(){
  const text=inp.value.trim();
  if(!text||loading) return;
  inp.value=''; inp.style.height='auto'; loading=true; btn.disabled=true;
  addMsg('user',text);
  history.push({role:'user',content:text});
  showTyping();
  try {
 const r=await fetch('/api/chat.js',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:history})});
    const data=await r.json();
    document.getElementById('typing')?.remove();
   if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
    const reply=data.content?.[0]?.text||'Sin respuesta';
    addMsg('ai',reply);
    history.push({role:'assistant',content:reply});
    if(history.length>20) history=history.slice(-20);
    localStorage.setItem('kepa-history',JSON.stringify(history));
  } catch(e){
    document.getElementById('typing')?.remove();
    const d=document.createElement('div');
    d.className='message ai';
    d.innerHTML=`<div class="msg-label">Kepa IA</div><div class="error-msg">⚠ ${e.message||'Error de conexión'}</div>`;
    msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
  }
  loading=false; btn.disabled=false; inp.focus();
}
if(history.length>0){
  welcome.style.display='none';
  history.forEach(m=>addMsg(m.role==='user'?'user':'ai',m.content));
}
inp.focus();
</script>
</body>
</html>
